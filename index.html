<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Login Wigest">
<meta name="theme-color" content="#1A3A5C">
<link rel="manifest" href="manifest.json">
<title>Login Wigest</title>
<style>
  :root {
    --blu: #1A3A5C;
    --blu-chiaro: #2C5F8A;
    --accento: #E8A020;
    --verde: #1E7A4A;
    --verde-chiaro: #E8F7EE;
    --rosso: #C0392B;
    --rosso-chiaro: #FBEAE8;
    --grigio-bg: #F2F4F7;
    --grigio-bordo: #D8DCE4;
    --testo: #1C2B3A;
    --testo-secondario: #5A6A7A;
    --bianco: #FFFFFF;
    --raggio: 12px;
    --raggio-sm: 8px;
    --ombra: 0 2px 12px rgba(26,58,92,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--grigio-bg);
    color: var(--testo);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
  }

  .contenitore { width: 100%; max-width: 380px; }

  .logo-area { text-align: center; margin-bottom: 40px; }
  .logo-icon {
    width: 80px; height: 80px;
    background: var(--blu);
    border-radius: 20px;
    margin: 0 auto 16px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: var(--ombra);
  }
  .logo-icon svg { width: 42px; height: 42px; }
  .logo-area h1 { font-size: 24px; font-weight: 700; color: var(--blu); letter-spacing: -0.5px; }
  .logo-area p { color: var(--testo-secondario); margin-top: 6px; font-size: 14px; }

  .card { background: var(--bianco); border-radius: var(--raggio); padding: 28px 24px; box-shadow: var(--ombra); }

  .campo { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .campo label { font-size: 12px; font-weight: 600; color: var(--testo-secondario); text-transform: uppercase; letter-spacing: 0.5px; }
  .campo input {
    border: 2px solid var(--grigio-bordo);
    border-radius: var(--raggio-sm);
    padding: 13px 14px;
    font-size: 16px;
    color: var(--testo);
    background: var(--bianco);
    outline: none;
    width: 100%;
  }
  .campo input:focus { border-color: var(--blu); }

  .btn-login {
    background: var(--blu);
    color: white;
    border: none;
    border-radius: var(--raggio-sm);
    padding: 16px 28px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: background 0.15s;
    margin-top: 8px;
  }
  .btn-login:active { background: var(--blu-chiaro); }
  .btn-login:disabled { background: var(--grigio-bordo); color: var(--testo-secondario); cursor: not-allowed; }

  .risultato {
    margin-top: 20px;
    border-radius: var(--raggio-sm);
    padding: 16px;
    font-size: 15px;
    font-weight: 700;
    text-align: center;
    display: none;
  }
  .risultato.ok { background: var(--verde-chiaro); border: 1px solid var(--verde); color: var(--verde); display: block; }
  .risultato.ko { background: var(--rosso-chiaro); border: 1px solid var(--rosso); color: var(--rosso); display: block; }
  .risultato.errore { background: #FFF3DC; border: 1px solid var(--accento); color: #7A4F00; display: block; }

  .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: girare 0.7s linear infinite; }
  @keyframes girare { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="contenitore">

  <div class="logo-area">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <h1>Login Wigest</h1>
    <p>Inserisci le tue credenziali</p>
  </div>

  <div class="card">
    <button class="btn-login" id="btn-login" onclick="eseguiLogin()">Accedi</button>

    <div class="risultato" id="risultato"></div>
  </div>

</div>

<script>
const SOAP_URL = 'https://www.lucchi.com:448/wigest617/servlet/bgla_chkpwd';

function buildSoapEnvelope() {
  return `<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<soapenv:Envelope xmlns:soapenv="http://schemas.xmlsoap.org/soap/envelope/" xmlns:bgla="http://bgla_chkpwd.ws.localhost/">
   <soapenv:Header/>
   <soapenv:Body>
      <bgla:bgla_chkpwd_Run>
         <bgla:m_UserName>admin</bgla:m_UserName>
         <bgla:m_Password>gla_DEC_2016</bgla:m_Password>
         <bgla:m_Company>9701</bgla:m_Company>
         <bgla:m_Instance>WIGEST_AMICIGIGI_1105</bgla:m_Instance>
         <bgla:p_User>1</bgla:p_User>
         <bgla:p_Password>gla_DEC_2016</bgla:p_Password>
      </bgla:bgla_chkpwd_Run>
   </soapenv:Body>
</soapenv:Envelope>`;
}

function leggiReturnSoap(xmlText) {
  try {
    const parser = new DOMParser();
    const doc = parser.parseFromString(xmlText, 'text/xml');
    const returnEl = doc.getElementsByTagNameNS('*', 'return')[0];
    return returnEl ? returnEl.textContent.trim() : null;
  } catch (err) {
    return null;
  }
}

function mostraRisultato(tipo, testo) {
  const el = document.getElementById('risultato');
  el.className = 'risultato ' + tipo;
  el.textContent = testo;
}

// Permette di premere Invio
document.addEventListener('DOMContentLoaded', () => {});

async function eseguiLogin() {
  const btn = document.getElementById('btn-login');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Verifica in corso...';
  document.getElementById('risultato').className = 'risultato';

  try {
    const risposta = await fetch(SOAP_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'text/xml; charset=UTF-8',
        'SOAPAction': '""'
      },
      body: buildSoapEnvelope()
    });

    const xml = await risposta.text();
    const valore = leggiReturnSoap(xml);

    if (valore === 'true') {
      mostraRisultato('ok', '✓ Login OK');
    } else if (valore === 'false') {
      mostraRisultato('ko', '✗ Login KO');
    } else {
      mostraRisultato('errore', `Risposta non riconosciuta: ${valore ?? 'nessuna'}`);
    }

  } catch (err) {
    mostraRisultato('errore', 'Impossibile contattare il server. Verifica la connessione.');
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Accedi';
  }
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
